name: Publish release artifacts

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

jobs:
  package-python-servers:
    name: Validate and package Python FastMCP servers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned server dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r DotMcp.IO/requirements.txt
          python -m pip install -r DotMcp.Fetch/requirements.txt
          python -m pip install -r DotMcp.Terminal/requirements.txt
      - name: Validate Python source
        run: python -m compileall -q DotMcp.IO/server.py DotMcp.Fetch/server.py DotMcp.Terminal/server.py
      - name: Create source archives
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/dotmcp-io-${TAG}.tar.gz" DotMcp.IO
          tar -czf "release-assets/dotmcp-fetch-${TAG}.tar.gz" DotMcp.Fetch
          tar -czf "release-assets/dotmcp-terminal-${TAG}.tar.gz" DotMcp.Terminal
      - uses: actions/upload-artifact@v4
        with:
          name: python-server-archives
          path: release-assets/*.tar.gz
          if-no-files-found: error

  build-assembly:
    name: Build Assembly executable (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, linux-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish self-contained executable
        run: |
          dotnet publish DotMcp.Assembly/DotMcp.Assembly.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --property:PublishSingleFile=true \
            --property:PublishTrimmed=false \
            --property:DebugType=None \
            --property:DebugSymbols=false \
            --output release-assets/dotmcp-assembly-${{ matrix.rid }}
      - name: Archive executable
        run: |
          tar -C release-assets \
            -czf release-assets/dotmcp-assembly-${{ matrix.rid }}.tar.gz \
            dotmcp-assembly-${{ matrix.rid }}
      - uses: actions/upload-artifact@v4
        with:
          name: assembly-${{ matrix.rid }}
          path: release-assets/dotmcp-assembly-${{ matrix.rid }}.tar.gz
          if-no-files-found: error

  publish-assembly-container:
    name: Publish Assembly container
    runs-on: ubuntu-latest
    needs: [package-python-servers, build-assembly]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: DotMcp.Assembly
          file: DotMcp.Assembly/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dot-tools-assembly:${{ github.ref_name }}

  publish-release:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs: [package-python-servers, build-assembly, publish-assembly-container]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "!*.dockerbuild"
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*.tar.gz
